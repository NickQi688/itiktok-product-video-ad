display_name: TikTok Product Video Ad
short_description: Generate TikTok ad storyboard prompts/images, video prompts, and optional API payloads for AC products or CoreGLP.
default_prompt: Create a TikTok product ad package from my product images and references. Ask for missing product line, duration, creative direction, claims/compliance limits, and requirements, then deliver a storyboard prompt/image and final video prompt; prepare an API payload if video generation is needed.
